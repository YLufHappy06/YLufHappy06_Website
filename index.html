<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="manifest" href="./manifest.json">

  <title>Class Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── AUTH CARD ── */
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 10px; border: 2px solid #e0e0e0;
      border-radius: 8px; background: none; cursor: pointer;
      font-size: 0.95rem; color: #666; transition: all 0.2s;
    }
    .tab.active { border-color: #4361ee; background: #4361ee; color: white; font-weight: 600; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #4361ee; }
    .btn {
      width: 100%; padding: 13px; background: #4361ee; color: white;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn:hover { background: #3451d1; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .message {
      margin-top: 16px; padding: 12px; border-radius: 8px;
      font-size: 0.9rem; text-align: center; display: none;
    }
    .message.success { background: #e6f4ea; color: #2e7d32; display: block; }
    .message.error   { background: #fdecea; color: #c62828; display: block; }

    /* ── CHAT APP ── */
    #chatApp {
      display: none;
      width: 100%;
      max-width: 700px;
      height: 92vh;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: #4361ee;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 { font-size: 1.1rem; }
    .chat-header p  { font-size: 0.8rem; opacity: 0.85; }
    .logout-btn {
      background: rgba(255,255,255,0.2); border: none; border-radius: 8px;
      padding: 6px 14px; cursor: pointer; color: white; font-size: 0.85rem;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.35); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.mine {
      align-self: flex-end;
      background: #4361ee;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.theirs {
      align-self: flex-start;
      background: #f0f4ff;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .msg .sender {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 3px;
      opacity: 0.7;
    }
    .msg .time {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    /* file attachment inside message */
    .msg .file-attach {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 7px 10px;
      background: rgba(0,0,0,0.08);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      font-size: 0.82rem;
    }
    .msg.mine .file-attach { background: rgba(255,255,255,0.2); color: white; }
    .file-attach .file-icon { font-size: 1.1rem; }

    /* image preview inside message */
    .msg img.preview {
      max-width: 200px;
      max-height: 160px;
      border-radius: 8px;
      margin-top: 6px;
      display: block;
      cursor: pointer;
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 12px 16px;
      border-top: 1px solid #e8ecff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-preview-bar {
      display: none;
      align-items: center;
      gap: 8px;
      background: #f0f4ff;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #333;
    }
    .file-preview-bar.visible { display: flex; }
    .file-preview-bar .remove-file {
      margin-left: auto;
      cursor: pointer;
      color: #e53935;
      font-weight: 700;
      background: none;
      border: none;
      font-size: 1rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #msgInput {
      flex: 1;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      font-family: inherit;
      max-height: 100px;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: #4361ee; }

    .icon-btn {
      width: 44px; height: 44px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: #4361ee; background: #f0f4ff; }

    .send-btn {
      width: 44px; height: 44px;
      background: #4361ee;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #3451d1; }
    .send-btn:disabled { background: #aaa; cursor: not-allowed; }

    .size-note {
      font-size: 0.73rem;
      color: #999;
      text-align: center;
    }

    #fileInput { display: none; }

    .empty-state {
      text-align: center;
      color: #aaa;
      margin: auto;
      font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

    /* ── DELETE BUTTON & DELETED STATE ── */
    .msg-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .msg-wrapper.mine  { flex-direction: row-reverse; }
    .msg-wrapper.theirs { flex-direction: row; }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      opacity: 0;
      padding: 4px;
      color: #e53935;
      transition: opacity 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }
    .msg-wrapper:hover .delete-btn { opacity: 1; }

    .msg.deleted {
      background: #f0f0f0 !important;
      color: #aaa !important;
      font-style: italic;
      font-size: 0.85rem;
    }
    .msg.deleted.mine {
      background: rgba(255,255,255,0.15) !important;
      color: rgba(255,255,255,0.5) !important;
    }
  </style>
</head>
<body>

<!-- ══ AUTH CARD ══ -->
<div class="card" id="authCard">
  <h1>📚 Class Chat</h1>
  <p class="subtitle">Sign in to join the class chat room</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Log In</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password"/>
    </div>
    <button class="btn" onclick="handleLogin()">Log In</button>
  </div>

  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min. 6 characters"/>
    </div>
    <button class="btn" onclick="handleSignup()">Create Account</button>
  </div>

  <div class="message" id="authMessage"></div>
</div>

<!-- ══ CHAT APP ══ -->
<div id="chatApp">
  <div class="chat-header">
    <div>
      <button id="push-noti-btn" class="noti-btn-disabled" style="padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;">
        🔒 Notification
      </button>
      <h2>📚 Class Chat Room</h2>
      <p id="headerUser"></p>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Log Out</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">💬</div>
      <p>No messages yet.<br/>Be the first to say something!</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="file-preview-bar" id="filePreviewBar">
      <span id="filePreviewIcon">📎</span>
      <span id="filePreviewName">filename.pdf</span>
      <button class="remove-file" onclick="clearFile()">✕</button>
    </div>

    <div class="input-row">
      <input type="file" id="fileInput" onchange="onFileSelected(event)"/>
      <button class="icon-btn" title="Attach file" onclick="document.getElementById('fileInput').click()">📎</button>
      <textarea id="msgInput" rows="1" placeholder="Type a message…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <p class="size-note">Max file size: 10 MB &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============================================================
  // 🔧 PASTE YOUR SUPABASE CREDENTIALS HERE
  // supabase.com → your project → Settings → API
  // ============================================================
  const SUPABASE_URL  = 'https://qwoosgkddaovxtavskga.supabase.co'
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3b29zZ2tkZGFvdnh0YXZza2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjI0ODQsImV4cCI6MjA5ODI5ODQ4NH0.jaFpQq_Cvxo6NziBh__-rZVsUdqbHY1ShjF7JeeFJWo'
  // ============================================================

  const MAX_FILE_MB   = 10
  const MAX_FILE_BYTES = MAX_FILE_MB * 1024 * 1024

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON)

  let currentUser = null
  let selectedFile = null

  // ── AUTH HELPERS ──────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('loginForm').style.display  = tab === 'login'  ? 'block' : 'none'
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none'
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', tab === 'login' ? i === 0 : i === 1))
    hideMessage()
  }
  function showMessage(text, type) {
    const el = document.getElementById('authMessage')
    el.textContent = text
    el.className = `message ${type}`
  }
  function hideMessage() {
    document.getElementById('authMessage').className = 'message'
  }

  async function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim()
    const password = document.getElementById('loginPassword').value
    if (!email || !password) return showMessage('Please fill in all fields.', 'error')
    const btn = document.querySelector('#loginForm .btn')
    btn.disabled = true; btn.textContent = 'Logging in…'
    const { data, error } = await sb.auth.signInWithPassword({ email, password })
    btn.disabled = false; btn.textContent = 'Log In'
    if (error) return showMessage(error.message, 'error')
    enterChat(data.user)
  }

  async function handleSignup() {
    const name     = document.getElementById('signupName').value.trim()
    const email    = document.getElementById('signupEmail').value.trim()
    const password = document.getElementById('signupPassword').value
    if (!name || !email || !password) return showMessage('Please fill in all fields.', 'error')
    if (password.length < 6) return showMessage('Password must be at least 6 characters.', 'error')
    const btn = document.querySelector('#signupForm .btn')
    btn.disabled = true; btn.textContent = 'Creating…'
    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } })
    btn.disabled = false; btn.textContent = 'Create Account'
    if (error) return showMessage(error.message, 'error')
    if (data.session) enterChat(data.user)
    else showMessage('✅ Check your email to confirm your account!', 'success')
  }

  async function handleLogout() {
    await sb.auth.signOut()
    currentUser = null
    document.getElementById('chatApp').style.display  = 'none'
    document.getElementById('authCard').style.display = 'block'
    document.body.style.alignItems = 'center'
  }

  // ── ENTER CHAT ────────────────────────────────────────────
  async function enterChat(user) {
    // Fetch fresh session to make sure we have the real user id
    const { data: { session } } = await sb.auth.getSession()
    currentUser = session?.user || user
    document.getElementById('authCard').style.display  = 'none'
    document.getElementById('chatApp').style.display   = 'flex'
    document.body.style.alignItems = 'stretch'
    const name = currentUser.user_metadata?.full_name || currentUser.email
    document.getElementById('headerUser').textContent = `Logged in as ${name}`
    loadMessages()
    subscribeRealtime()
  }

  // ── LOAD EXISTING MESSAGES ────────────────────────────────
  async function loadMessages() {
    const { data, error } = await sb
      .from('messages')
      .select('*')
      .order('created_at', { ascending: true })
      .limit(100)
    if (error) return console.error(error)
    const container = document.getElementById('messages')
    container.innerHTML = ''
    if (!data.length) {
      container.innerHTML = `<div class="empty-state" id="emptyState"><div class="icon">💬</div><p>No messages yet.<br/>Be the first to say something!</p></div>`
      return
    }
    data.forEach(msg => appendMessage(msg))
    scrollToBottom()
  }

  // ── REALTIME SUBSCRIPTION ─────────────────────────────────
  function subscribeRealtime() {
    sb.channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        document.getElementById('emptyState')?.remove()
        appendMessage(payload.new)
        scrollToBottom()
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
        const wrapper = document.querySelector(`.msg-wrapper[data-id="${payload.old.id}"]`)
        if (wrapper) {
          // Show placeholder for everyone, but row is gone from DB
          const isMine = wrapper.classList.contains('mine')
          wrapper.innerHTML = `<div class="msg ${isMine ? 'mine' : 'theirs'} deleted">🚫 This message was deleted</div>`
          // Remove after 3 seconds
          setTimeout(() => wrapper.remove(), 3000)
        }
      })
      .subscribe()
  }

  // ── DELETE MESSAGE ────────────────────────────────────────
  async function deleteMessage(id) {
    if (!confirm('Delete this message?')) return
    const { error } = await sb
      .from('messages')
      .delete()
      .eq('id', id)
      .eq('user_id', currentUser.id)
    if (error) alert('Could not delete: ' + error.message)
  }

  // ── RENDER A MESSAGE ──────────────────────────────────────
  function appendMessage(msg) {
    const myId = currentUser?.id || ''
    const isMine = msg.user_id === myId
    const wrapper = document.createElement('div')
    wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`
    wrapper.dataset.id = msg.id
    wrapper.dataset.userId = msg.user_id
    wrapper.innerHTML = buildMessageHTML(msg, isMine)
    document.getElementById('messages').appendChild(wrapper)
  }

  function buildMessageHTML(msg, isMine) {
    const utcString = msg.created_at.includes('Z') ? msg.created_at : `${msg.created_at}Z`;

    const time = new Date(utcString).toLocaleTimeString('vi-VN', { 
      hour: '2-digit', 
      minute: '2-digit', 
      timeZone: 'Asia/Ho_Chi_Minh' 
    });

    if (msg.deleted) {
      return `<div class="msg ${isMine ? 'mine' : 'theirs'} deleted">🚫 This message was deleted</div>`
    }

    let inner = isMine ? '' : `<div class="sender">${escHtml(msg.user_name || 'Unknown')}</div>`
    if (msg.content) inner += `<div>${escHtml(msg.content)}</div>`

    if (msg.file_url) {
      const isImage = msg.file_type && msg.file_type.startsWith('image/')
      if (isImage) {
        inner += `<img class="preview" src="${msg.file_url}" alt="${escHtml(msg.file_name)}"
          onclick="window.open('${msg.file_url}','_blank')"/>`
      } else {
        const icon = fileIcon(msg.file_type)
        inner += `<a class="file-attach" href="${msg.file_url}" target="_blank" rel="noopener">
          <span class="file-icon">${icon}</span>
          <span>${escHtml(msg.file_name)}</span>
        </a>`
      }
    }

    inner += `<div class="time">${time}</div>`

    const msgDiv = `<div class="msg ${isMine ? 'mine' : 'theirs'}">${inner}</div>`
    const delBtn = isMine ? `<button class="delete-btn" title="Delete message" onclick="deleteMessage(${msg.id})">🗑️</button>` : ''
    return msgDiv + delBtn
  }

  // ── SEND MESSAGE ──────────────────────────────────────────
  async function sendMessage() {
    const text = document.getElementById('msgInput').value.trim()
    if (!text && !selectedFile) return

    const btn = document.getElementById('sendBtn')
    btn.disabled = true

    let file_url = null, file_name = null, file_type = null

    // Upload file if attached
    if (selectedFile) {
      const path = `${currentUser.id}/${Date.now()}_${selectedFile.name}`
      const { data: upData, error: upErr } = await sb.storage
        .from('chat-files')
        .upload(path, selectedFile, { contentType: selectedFile.type })

      if (upErr) {
        alert('Upload failed: ' + upErr.message)
        btn.disabled = false
        return
      }

      const { data: urlData } = sb.storage.from('chat-files').getPublicUrl(path)
      file_url  = urlData.publicUrl
      file_name = selectedFile.name
      file_type = selectedFile.type
    }

    const name = currentUser.user_metadata?.full_name || currentUser.email

    const { error } = await sb.from('messages').insert({
      user_id:   currentUser.id,
      user_name: name,
      content:   text || null,
      file_url, file_name, file_type
    })

    btn.disabled = false

    if (error) { alert('Failed to send: ' + error.message); return }

    document.getElementById('msgInput').value = ''
    document.getElementById('msgInput').style.height = 'auto'
    clearFile()
  }

  // ── FILE SELECTION ────────────────────────────────────────
  function onFileSelected(e) {
    const file = e.target.files[0]
    if (!file) return

    if (file.size > MAX_FILE_BYTES) {
      alert(`❌ File too large! Max size is ${MAX_FILE_MB} MB.\nYour file: ${(file.size/1024/1024).toFixed(1)} MB`)
      e.target.value = ''
      return
    }

    selectedFile = file
    const bar = document.getElementById('filePreviewBar')
    bar.classList.add('visible')
    document.getElementById('filePreviewIcon').textContent = fileIcon(file.type)
    document.getElementById('filePreviewName').textContent = `${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`
  }

  function clearFile() {
    selectedFile = null
    document.getElementById('fileInput').value = ''
    document.getElementById('filePreviewBar').classList.remove('visible')
  }

  // ── UTILS ─────────────────────────────────────────────────
  function scrollToBottom() {
    const el = document.getElementById('messages')
    el.scrollTop = el.scrollHeight
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 100) + 'px'
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function fileIcon(type) {
    if (!type) return '📎'
    if (type.startsWith('image/'))       return '🖼️'
    if (type === 'application/pdf')      return '📄'
    if (type.includes('word'))           return '📝'
    if (type.includes('spreadsheet') || type.includes('excel')) return '📊'
    if (type.includes('zip') || type.includes('rar'))           return '🗜️'
    return '📎'
  }

  // ── AUTO LOGIN ────────────────────────────────────────────
  async function checkSession() {
    const { data: { session } } = await sb.auth.getSession()
    if (session) enterChat(session.user)
  }
  checkSession()
</script>

<script src="https://jsdelivr.net" defer></script>
<script src="./app.js" defer></script>

</body>
</html>
